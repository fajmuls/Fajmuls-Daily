<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fajmul Daily</title>
    <link rel="manifest" href="./manifest.json" />
    <meta name="theme-color" content="#F37021" />
    <link rel="apple-touch-icon" href="./apple-touch-icon.png" />
    <link rel="icon" type="image/png" href="./icon-192.png" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Fajmul Daily" />
    <script>
      // Silence Vite WebSocket connection errors
      window.addEventListener('unhandledrejection', function(event) {
        if (event.reason && (
          String(event.reason).includes('WebSocket') || 
          String(event.reason).includes('websocket') || 
          (event.reason.message && (
            String(event.reason.message).includes('WebSocket') || 
            String(event.reason.message).includes('websocket')
          ))
        )) {
          event.preventDefault();
          event.stopPropagation();
          console.warn('Silenced unhandled WebSocket rejection:', event.reason);
        }
      });
      window.addEventListener('error', function(event) {
        if (event.message && (
          event.message.includes('WebSocket') || 
          event.message.includes('websocket') || 
          event.message.includes('vite')
        )) {
          event.preventDefault();
          event.stopPropagation();
          console.warn('Silenced error:', event.message);
        }
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('./sw.js').catch(error => {
            console.log('ServiceWorker registration failed: ', error);
          });
        });
      }
    </script>
  </body>
</html>
